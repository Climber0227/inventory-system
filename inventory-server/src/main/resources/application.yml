server:
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  port: 8888

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  application:
    name: inventory-server
  datasource:
    url: jdbc:mysql://localhost:3306/inventory?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.inventory.**.entity
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  jwt-secret-key: ${JWT_SECRET:inventory-system-jwt-secret-key-2024}
  token-style: uuid
  is-log: true
  is-read-body: false
  is-read-cookie: false
  is-read-header: true
  timeout: -1
  active-timeout: -1
  is-concurrent: true
  is-share: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.inventory: debug
